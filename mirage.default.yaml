# mirage-proxy configuration
# Copy to mirage.yaml and customize

# Target LLM API
target: "https://api.openai.com"

# Proxy settings
bind: "127.0.0.1"
port: 8686

# Sensitivity: low | medium | high | paranoid
# low: only always_redact categories
# medium: always_redact + mask categories (default)
# high: always_redact + mask + warn categories
# paranoid: redact everything detected
sensitivity: medium

# Categories and their actions
rules:
  # Always redact — LLM never needs the real value
  always_redact:
    - SSN
    - CREDIT_CARD
    - PRIVATE_KEY
    - AWS_KEY
    - GITHUB_TOKEN
    - API_KEY
    - BEARER_TOKEN
    - CONNECTION_STRING
    - SECRET

  # Redact with plausible fakes — preserves semantic role
  mask:
    - EMAIL
    - PHONE

  # Log warning but don't redact
  warn_only:
    - IP_ADDRESS

# Code blocks: don't redact inside ``` fenced blocks
code_block_passthrough: false

# Allowlist: never redact these values (globs supported)
allowlist: []
  # - "192.168.1.*"
  # - "*@company.com"
  # - "sk-test-*"

# Blocklist: always redact these (overrides allowlist)
blocklist: []
  # - "*@personal.com"

# Custom upstream API providers (OpenAI-compatible)
# Define additional path prefix → upstream URL mappings.
# Custom providers are checked before built-in providers.
# Example:
# custom_providers:
#   - prefix: "/nanogpt"
#     upstream: "https://nano-gpt.com/api/v1"
#   - prefix: "/my-company"
#     upstream: "https://gateway.mycompany.com/llm/v1"
#
# Then set your tool's base URL to http://127.0.0.1:8686/{prefix}
# e.g., export OPENAI_BASE_URL=http://127.0.0.1:8686/nanogpt
custom_providers: []

# Custom pattern definitions
# Define regex patterns to detect and substitute with replacement strings.
# Mappings are stored in the session faker for response rehydration.
# Example:
# custom_patterns:
#   - name: "MY_NAME"
#     pattern: "\\bnathan\\b"
#     substitute: "john"
#   - name: "WORK_ID"
#     pattern: "\\b343-324\\b"
#     substitute: "000-000"
custom_patterns: []

# Audit log
audit:
  enabled: true
  path: "./mirage-audit.jsonl"
  # Log original values (WARNING: defeats the purpose if log is compromised)
  log_values: false

# Dry run: log what would be redacted without actually redacting
dry_run: false

# Buffer streaming responses: collect all SSE chunks before rehydrating
# Eliminates chunk-boundary rehydration issues; increases first-token latency
force_no_stream: false

# Check GitHub releases for newer mirage-proxy versions at startup
update_check:
  enabled: true
  timeout_ms: 1200      # network timeout (check runs in background)
